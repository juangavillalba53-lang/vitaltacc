<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin - VitalTacc</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <header class="header-admin">

        <h1>Panel Administrativo</h1>

        <div id="user-info"></div>

    </header>

    <div class="tabs-admin">

        <button onclick="mostrarPanel('producto')">
            Agregar producto
        </button>

        <button onclick="mostrarPanel('precio')">
            Modificar precio
        </button>

        <button onclick="mostrarPanel('lote')">
            Agregar lote
        </button>

    </div>

    <div class="container-admin">

        <!-- 🔥 AGREGAR PRODUCTO -->
        <div id="panel-producto" class="panel-admin">
            <h2>Agregar producto</h2>

            <input type="text" id="nombreProducto" placeholder="Nombre del producto">
            <input type="number" step="0.01" id="precioProducto" placeholder="Precio">

            <button onclick="crearProducto()">Guardar producto</button>
        </div>

        <!-- 🔥 EDITAR PRECIO -->
        <div id="panel-precio" class="panel-admin">
            <h2>Editar precio</h2>

            <select id="productoEditar"></select>

            <input type="number" step="0.01" id="nuevoPrecio" placeholder="Nuevo precio">

            <button onclick="actualizarPrecio()">Actualizar precio</button>
        </div>

        <!-- 🔥 AGREGAR LOTE -->
        <div id="panel-lote" class="panel-admin">
            <h2>Agregar lote</h2>

            <select id="productoLote"></select>

            <input type="text" id="precioLote" placeholder="Precio" readonly>

            <input type="number" id="cantidadLote" placeholder="Cantidad">

            <input type="date" id="vencimientoLote">

            <button onclick="crearLote()">Guardar lote</button>

            <p id="loteCreado"></p>
        </div>

        <!-- 🔥 LOTES -->
        <div class="header-lotes">
            <h2>Lotes por vencer</h2>
            <button onclick="toggleBusqueda()">Buscar</button>
        </div>

        <input type="text" id="busquedaLote" placeholder="Buscar producto o lote" oninput="buscarLotes()"
            style="display: none;">

        <div class="filtros-lotes">
            <button onclick="setFiltro('URGENTE')">Urgentes</button>
            <button onclick="setFiltro('ATENCION')">Atención</button>
            <button onclick="setFiltro('TODOS')">Todos</button>
        </div>

        <ul id="lotesVencer"></ul>

        <!-- 🔥 FILTRO -->
        <div id="seccion-filtro" class="filtro">
            <h2>Filtrar por mes</h2>

            <select id="mes">
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
            </select>

            <input type="number" id="anio" value="2026">

            <button onclick="filtrar()">Filtrar</button>

            <p id="filtroActual"></p>
        </div>

        <!-- 🔥 RESULTADOS (SOLO ADMIN) -->
        <div id="seccion-reportes" class="grid-admin">

            <div class="card-admin">
                <h2>Total facturado</h2>
                <p id="total"></p>
            </div>

            <div class="card-admin">
                <h2>Productos más vendidos</h2>
                <ul id="masVendidos"></ul>
            </div>

            <div class="card-admin">
                <h2>Top clientes</h2>
                <ul id="topClientes"></ul>
            </div>

            <div class="card-admin full">
                <h2>Ventas por año</h2>
                <canvas id="graficoVentas"></canvas>
            </div>

        </div>

        <!-- 🔥 GESTIÓN USUARIOS -->
        <div id="seccion-usuarios" class="card-admin full">

            <h2>Gestionar usuarios</h2>

            <!-- 🔥 CREAR USUARIO -->
            <div class="crear-usuario">

                <input type="text" id="nombreUsuario" placeholder="Nombre">

                <input type="email" id="emailUsuario" placeholder="Email">

                <input type="password" id="contrasenaUsuario" placeholder="Contraseña temporal">

                <select id="rolUsuario">
                    <option value="EMPLEADO">EMPLEADO</option>
                    <option value="ADMIN">ADMIN</option>
                </select>

                <button onclick="crearUsuario()">
                    Crear usuario
                </button>

            </div>

            <!-- 🔥 TABLA -->
            <table class="tabla-usuarios">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaUsuarios"></tbody>

            </table>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="admin.js"></script>

</body>

</html>
