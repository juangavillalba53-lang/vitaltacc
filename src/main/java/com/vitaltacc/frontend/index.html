<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>VitalTacc</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico">
</head>

<body>

    <header>
        <h1>VitalTacc - Tienda</h1>
    </header>

    <div class="container">

        <!-- PRODUCTOS -->
        <div class="productos" id="lista-productos"></div>

        <!-- CARRITO -->
        <div class="carrito">
            <h2>Carrito</h2>
            <ul id="lista-carrito"></ul>

            <p class="total">Total: $<span id="total">0</span></p>

            <button class="btn-finalizar" onclick="finalizarCompra()">
                Finalizar compra
            </button>
        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
